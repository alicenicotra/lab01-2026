<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alice Nicotra">
    <title>Film Library</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <i class="bi bi-collection-play me-2 fs-4"></i> Film Library
        </a>
        <div class="ms-auto me-3" style="width: 60%;">
            <input type="search" class="form-control" placeholder="Search...">
        </div>
        <div>
            <i class="bi bi-person-circle text-white fs-3"></i>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            
            <aside class="col-md-4 col-lg-3 sidebar py-4">
                <h5 class="px-3 mb-3 text-secondary">Filters</h5>
                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action active bg-primary border-0">All</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent border-0">Favorites</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent border-0">Best Rated</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent border-0">Seen Last Month</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent border-0">Unseen</a>
                </div>
            </aside>

            <main class="col-md-8 col-lg-9 py-4">
                <h1 class="mb-4">All films</h1>
                
                <ul class="list-group list-group-flush">
                    
                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart-fill text-danger me-3 fs-5"></i> Pulp fiction
                            </div>
                            <div class="col-4 text-center text-secondary">March 10, 2026</div>
                            <div class="col-4 d-flex justify-content-end align-items-center">
                                <div class="star-color me-4">
                                    <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star"></i>
                                </div>
                                <i class="bi bi-pencil action-icon"></i>
                                <i class="bi bi-trash action-icon"></i>
                            </div>
                        </div>
                    </li>

                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart me-3 fs-5 text-secondary"></i> 21 Grams
                            </div>
                            <div class="col-4 text-center text-secondary">March 17, 2026</div>
                            <div class="col-4 d-flex justify-content-end align-items-center">
                                <div class="star-color me-4">
                                    <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star"></i><i class="bi bi-star"></i>
                                </div>
                                <i class="bi bi-pencil action-icon"></i>
                                <i class="bi bi-trash action-icon"></i>
                            </div>
                        </div>
                    </li>

                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart me-3 fs-5 text-secondary"></i> Star Wars
                            </div>
                            <div class="col-4 text-center text-secondary"></div>
                            <div class="col-4 d-flex justify-content-end align-items-center">
                                <div class="text-secondary me-4">
                                    <i class="bi bi-star"></i><i class="bi bi-star"></i><i class="bi bi-star"></i><i class="bi bi-star"></i><i class="bi bi-star"></i>
                                </div>
                                <i class="bi bi-pencil action-icon"></i>
                                <i class="bi bi-trash action-icon"></i>
                            </div>
                        </div>
                    </li>

                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart me-3 fs-5 text-secondary"></i> Matrix
                            </div>
                            <div class="col-4 text-center text-secondary"></div>
                            <div class="col-4 d-flex justify-content-end align-items-center">
                                <div class="text-secondary me-4">
                                    <i class="bi bi-star"></i><i class="bi bi-star"></i><i class="bi bi-star"></i><i class="bi bi-star"></i><i class="bi bi-star"></i>
                                </div>
                                <i class="bi bi-pencil action-icon"></i>
                                <i class="bi bi-trash action-icon"></i>
                            </div>
                        </div>
                    </li>

                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart-fill text-danger me-3 fs-5"></i> Shrek 2
                            </div>
                            <div class="col-4 text-center text-secondary">March 21, 2026</div>
                            <div class="col-4 d-flex justify-content-end align-items-center">
                                <div class="star-color me-4">
                                    <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                                </div>
                                <i class="bi bi-pencil action-icon"></i>
                                <i class="bi bi-trash action-icon"></i>
                            </div>
                        </div>
                    </li>

                </ul>
            </main>
        </div>
    </div>

    <button class="btn btn-primary btn-add">
        <i class="bi bi-plus"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
